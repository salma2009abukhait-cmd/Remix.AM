<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remix.AM</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:#111827}
.navbar h1{color:#ef4444}
.search{padding:8px;border-radius:8px;border:none;width:200px}
.container{display:grid;grid-template-columns:3fr 1fr;gap:20px;padding:20px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
.card{background:#1f2937;padding:10px;border-radius:15px;transition:.3s;box-shadow:0 0 10px rgba(0,0,0,0.5)}
.card:hover{transform:scale(1.05);box-shadow:0 0 20px #ef4444}
.card img{width:100%;height:160px;object-fit:cover;border-radius:10px}
.card button{width:100%;background:#ef4444;border:none;padding:8px;margin-top:5px;color:white;border-radius:10px;cursor:pointer}
.sidebar{background:#111827;padding:15px;border-radius:15px}
.cart-item{background:#1f2937;padding:10px;border-radius:10px;margin-top:10px}
.cart-item button{margin-left:5px;background:red;border:none;color:white;padding:3px 6px;border-radius:5px;cursor:pointer}
.checkout{margin-top:20px;padding:10px;background:#1f2937;border-radius:10px}
input{width:100%;padding:8px;margin-top:5px;border-radius:8px;border:none}
.checkout button{margin-top:10px;width:100%;padding:10px;background:#22c55e;border:none;color:white;border-radius:10px;cursor:pointer}
</style>
</head>
<body><div class="navbar">
<h1>Remix.AM</h1>
<input class="search" placeholder="Search games..." oninput="searchGame(this.value)">
</div><div class="container">
<div class="products" id="products"></div><div class="sidebar">
<h3>Cart 🛒</h3>
<div id="cartItems"></div>
<h4>Total: $<span id="total">0</span></h4><div class="checkout">
<h4>Checkout</h4>
<input placeholder="Your Name" id="name">
<input placeholder="Card Number">
<button onclick="checkout()">Pay Now</button>
</div></div>
</div><script>
const products=[
{name:"GTA V",price:30,img:"https://upload.wikimedia.org/wikipedia/en/a/a5/Grand_Theft_Auto_V.png"},
{name:"Minecraft",price:30,img:"https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_cover.png"},
{name:"Call of Duty MW2",price:70,img:"https://upload.wikimedia.org/wikipedia/en/6/6c/Call_of_Duty_Modern_Warfare_II_Key_Art.jpg"},
{name:"Red Dead Redemption 2",price:60,img:"https://upload.wikimedia.org/wikipedia/en/4/44/Red_Dead_Redemption_II.jpg"},
{name:"Rocket League",price:20,img:"https://upload.wikimedia.org/wikipedia/en/e/e0/Rocket_League_coverart.jpg"},
{name:"eFootball 2025",price:25,img:"https://upload.wikimedia.org/wikipedia/en/e/e2/EFootball_2024_cover.jpg"},
{name:"FC 26",price:70,img:"https://upload.wikimedia.org/wikipedia/en/7/7c/EA_Sports_FC_24_Cover.jpg"}
];

let cart={};
let total=0;

function saveCart(){localStorage.setItem('cart',JSON.stringify(cart));}
function loadCart(){const data=localStorage.getItem('cart');if(data){cart=JSON.parse(data);updateCart();}}

function addToCart(name,price){
if(cart[name]){cart[name].qty++;}else{cart[name]={price:price,qty:1};}
updateCart();
}

function removeItem(name){delete cart[name];updateCart();}
function changeQty(name,delta){cart[name].qty+=delta;if(cart[name].qty<=0) delete cart[name];updateCart();}

function updateCart(){
const cartDiv=document.getElementById('cartItems');
cartDiv.innerHTML="";
total=0;

for(let item in cart){
const data=cart[item];
total+=data.price*data.qty;

const div=document.createElement('div');
div.className='cart-item';
div.innerHTML=`
${item} - $${data.price} x ${data.qty}<br>
<button onclick="changeQty('${item}',1)">+</button>
<button onclick="changeQty('${item}',-1)">-</button>
<button onclick="removeItem('${item}')">Delete</button>
`;
cartDiv.appendChild(div);
}

document.getElementById('total').innerText=total;
saveCart();
}

function checkout(){
const name=document.getElementById('name').value;
if(!name || total===0){alert('Fill name and add items');return;}
alert('Payment Successful ✅');
cart={};
updateCart();
}

function displayProducts(list){
const container=document.getElementById('products');
container.innerHTML="";
list.forEach(p=>{
const div=document.createElement('div');
div.className='card';
div.innerHTML=`
<img src="${p.img}">
<h4>${p.name}</h4>
<p>$${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add to Cart</button>
`;
container.appendChild(div);
});
}

function searchGame(text){
const filtered=products.filter(p=>p.name.toLowerCase().includes(text.toLowerCase()));
displayProducts(filtered);
}

displayProducts(products);
loadCart();
</script></body>
</html>
